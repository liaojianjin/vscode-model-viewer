<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Remote Model Viewer">
  <defs>
    <linearGradient id="bg" x1="28" y1="18" x2="226" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a7c63"/>
      <stop offset="0.48" stop-color="#0f3f83"/>
      <stop offset="1" stop-color="#0a1531"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(108 106) rotate(38) scale(118 132)">
      <stop offset="0" stop-color="#7cf4d1" stop-opacity="0.28"/>
      <stop offset="0.65" stop-color="#5ea9ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5ea9ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sliceTop" x1="54" y1="86" x2="170" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#d5e6fb"/>
    </linearGradient>
    <linearGradient id="sliceMid" x1="60" y1="112" x2="176" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9eeff"/>
      <stop offset="1" stop-color="#a7ccff"/>
    </linearGradient>
    <linearGradient id="sliceBot" x1="66" y1="138" x2="182" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8be8d3"/>
      <stop offset="1" stop-color="#3f92ff"/>
    </linearGradient>
    <linearGradient id="edge" x1="70" y1="78" x2="186" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#71f0c7"/>
      <stop offset="1" stop-color="#7fc3ff"/>
    </linearGradient>
    <linearGradient id="node" x1="170" y1="70" x2="216" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9cf7db"/>
      <stop offset="1" stop-color="#7ab1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <!-- 1. 取 alpha -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="9" result="blur"/>

      <!-- 2. 偏移 -->
      <feOffset in="blur" dx="0" dy="10" result="offsetBlur"/>

      <!-- 3. 上色 -->
      <feFlood flood-color="#04112a" flood-opacity="0.35" result="shadowColor"/>

      <!-- 4. 颜色和阴影合成 -->
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>

      <!-- 5. 合并回原图 -->
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="18" y="18" width="220" height="220" rx="48" fill="url(#bg)"/>
  <rect x="18" y="18" width="220" height="220" rx="48" fill="url(#glow)"/>
  <path d="M34 190c34-18 60-27 92-26c30 0 58 7 96 28v26H34Z" fill="#06132b" opacity="0.18"/>

  <g filter="url(#shadow)">
    <g transform="rotate(-9 116 134)">
      <rect x="54" y="74" width="118" height="42" rx="18" fill="url(#sliceTop)"/>
      <rect x="60" y="102" width="118" height="42" rx="18" fill="url(#sliceMid)" opacity="0.95"/>
      <rect x="66" y="130" width="118" height="42" rx="18" fill="url(#sliceBot)" opacity="0.96"/>

      <g fill="#123565" opacity="0.9">
        <rect x="76" y="87" width="16" height="16" rx="4"/>
        <rect x="98" y="87" width="16" height="16" rx="4"/>
        <rect x="120" y="87" width="16" height="16" rx="4"/>
        <rect x="76" y="109" width="16" height="16" rx="4" opacity="0.75"/>
        <rect x="98" y="109" width="16" height="16" rx="4" opacity="0.75"/>
        <rect x="120" y="109" width="16" height="16" rx="4" opacity="0.75"/>
      </g>

      <path d="M148 95h12" stroke="#123565" stroke-width="8" stroke-linecap="round" opacity="0.28"/>
      <path d="M154 123h14" stroke="#123565" stroke-width="8" stroke-linecap="round" opacity="0.24"/>
      <path d="M160 151h14" stroke="#123565" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
    </g>

    <g stroke="url(#edge)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M152 104l30-26"/>
      <path d="M164 132h36"/>
      <path d="M174 160l26 26"/>
      <path d="M98 176l-22 20"/>
    </g>

    <g fill="url(#node)" stroke="#ecfbff" stroke-width="4">
      <circle cx="192" cy="70" r="15"/>
      <circle cx="212" cy="132" r="17"/>
      <circle cx="202" cy="188" r="14"/>
      <circle cx="64" cy="208" r="12"/>
    </g>

    <g fill="#123565">
      <rect x="186" y="66" width="12" height="8" rx="4"/>
      <rect x="206" y="128" width="12" height="8" rx="4"/>
      <rect x="196" y="184" width="12" height="8" rx="4"/>
      <rect x="58" y="204" width="12" height="8" rx="4"/>
    </g>
  </g>
</svg>
